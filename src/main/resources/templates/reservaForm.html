<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Nova Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-light px-4">
    <span class="navbar-brand mb-0 h1">Nova Reserva</span>
</nav>

<div class="container mt-4" style="max-width: 700px;">

    <th:block th:include="mensagemValidacao"></th:block>

    <form method="post" action="/newReserva">

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" name="titulo" class="form-control" placeholder="Ex: Reunião da TI">
        </div>

        <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea name="descricao" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Data</label>
            <input type="date" name="data" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Hora início</label>
            <input type="time" name="horaInicio" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Hora fim</label>
            <input type="time" name="horaFim" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-control">
                <option value="AGENDADA">AGENDADA</option>
                <option value="CANCELADA">CANCELADA</option>
                <option value="FINALIZADA">FINALIZADA</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="/agendar" class="btn btn-secondary">Voltar</a>

    </form>
</div>

</body>
</html>
