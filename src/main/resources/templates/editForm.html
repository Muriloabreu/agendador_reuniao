<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Editar Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-light px-4">
    <span class="navbar-brand mb-0 h1">Editar Reserva</span>
</nav>

<div class="container mt-4" style="max-width: 700px;">

    <th:block th:include="mensagemValidacao"></th:block>

    <form method="post" th:action="@{/agendar/{id}(id=${evento.id})}" th:object="${evento}">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" th:field="*{titulo}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea th:field="*{descricao}" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Data</label>
            <input type="date" th:field="*{data}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Hora início</label>
            <input type="time" th:field="*{horaInicio}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Hora fim</label>
            <input type="time" th:field="*{horaFim}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select th:field="*{status}" class="form-control">
                <option value="AGENDADA">AGENDADA</option>
                <option value="CANCELADA">CANCELADA</option>
                <option value="FINALIZADA">FINALIZADA</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Atualizar</button>
        <a href="/agendar" class="btn btn-secondary">Voltar</a>

    </form>
</div>

</body>
</html>
