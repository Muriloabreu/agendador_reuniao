<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Detalhes da Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-light bg-light px-4">
    <span class="navbar-brand mb-0 h1">Detalhes da Reserva</span>
</nav>

<div class="container mt-4" style="max-width: 700px;">

    <div class="card">
        <div class="card-body">

            <h4 th:text="${evento.titulo}"></h4>

            <p>
                <strong>Descrição:</strong>
                <span th:text="${evento.descricao}"></span>
            </p>

            <p>
                <strong>Data:</strong>
                <span th:text="${evento.data}"></span>
            </p>

            <p>
                <strong>Hora início:</strong>
                <span th:text="${evento.horaInicio}"></span>
            </p>

            <p>
                <strong>Hora fim:</strong>
                <span th:text="${evento.horaFim}"></span>
            </p>

            <p>
                <strong>Status:</strong>
                <span th:text="${evento.status}"></span>
            </p>

        </div>
    </div>

    <a href="/agendar" class="btn btn-secondary mt-3">Voltar</a>

</div>

</body>
</html>
